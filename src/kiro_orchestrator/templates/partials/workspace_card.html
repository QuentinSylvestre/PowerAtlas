<div class="workspace-card{% if stale %} stale{% endif %}">
  <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <span class="card-chevron">▼</span>
    <span class="card-folder-name">{{ folder_name }}</span>
    <div class="card-meta">
      <span class="card-count">{{ sessions|length }}</span>
      {% if stale %}<span class="badge-stale">missing</span>{% endif %}
    </div>
  </div>
  <div class="card-body">
    {% if sessions %}
    {% for session in sessions %}
    {% include "partials/session_row.html" %}
    {% endfor %}
    {% else %}
    <div class="new-session-inline">+ New session</div>
    {% endif %}
  </div>
</div>
