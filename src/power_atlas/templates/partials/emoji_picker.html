<div class="emoji-picker" id="emoji-picker" role="dialog" aria-label="Icon picker" style="display:none">
  <div class="emoji-tabs" role="tablist">
    <button class="emoji-tab active" role="tab" data-cat="tools">Tools</button>
    <button class="emoji-tab" role="tab" data-cat="objects">Objects</button>
    <button class="emoji-tab" role="tab" data-cat="nature">Nature</button>
    <button class="emoji-tab" role="tab" data-cat="symbols">Symbols</button>
    <button class="emoji-tab" role="tab" data-cat="flags">Flags</button>
  </div>
  <div class="emoji-grid" role="grid" aria-label="Emoji options"></div>
  <div class="emoji-custom">
    <input type="text" placeholder="Custom emoji or text" aria-label="Custom icon input" maxlength="4">
  </div>
  <div class="emoji-picker-footer">
    <button class="emoji-reset" aria-label="Reset icon">Reset</button>
    <button class="emoji-close" aria-label="Close picker">Close</button>
  </div>
</div>
<script>
(function(){
  const EMOJI_SETS={
    tools:['рҹ”§','рҹӣ пёҸ','вҡҷпёҸ','рҹ”Ё','рҹӘӣ','рҹ”©','вӣҸпёҸ','рҹӘҡ','рҹ”¬','рҹ§Ә','рҹ’»','рҹ–ҘпёҸ','вҢЁпёҸ','рҹ–ұпёҸ','рҹ“ұ'],
    objects:['рҹ“Ғ','рҹ“Ӯ','рҹ“Ұ','рҹ—ӮпёҸ','рҹ’ј','рҹҺ’','рҹ“ҡ','рҹ“–','рҹ—ғпёҸ','рҹ’ҫ','рҹ“Ӣ','рҹ“қ','рҹҸ—пёҸ','рҹҸ ','рҹҺҜ'],
    nature:['рҹҢұ','рҹҢҝ','рҹҚҖ','рҹҢі','рҹҢІ','рҹҢө','рҹҢҠ','вҡЎ','рҹ”Ҙ','вқ„пёҸ','рҹҢё','рҹҚ„','рҹӘЁ','рҹҢҷ','вӯҗ'],
    symbols:['вҡЎ','рҹ’Ў','рҹ”‘','рҹӣЎпёҸ','рҹҡҖ','рҹ’Һ','рҹ”’','рҹҸ·пёҸ','рҹ“Ң','рҹҺЁ','вңЁ','вҷ»пёҸ','вҡ пёҸ','рҹ’«','рҹ”®'],
    flags:['рҹҸҒ','рҹҡ©','рҹҺҢ','рҹҸҙ','рҹҸіпёҸ','рҹҮәрҹҮё','рҹҮ¬рҹҮ§','рҹҮ«рҹҮ·','рҹҮ©рҹҮӘ','рҹҮҜрҹҮө','рҹҮ°рҹҮ·','рҹҮЁрҹҮі','рҹҮ®рҹҮі','рҹҮ§рҹҮ·','рҹҮЁрҹҮҰ']
  };
  let _target=null,_workspace='';
  const picker=document.getElementById('emoji-picker');
  const grid=picker.querySelector('.emoji-grid');
  const input=picker.querySelector('.emoji-custom input');

  function renderGrid(cat){
    grid.innerHTML='';
    for(const e of EMOJI_SETS[cat]){
      const b=document.createElement('button');
      b.textContent=e;b.type='button';
      b.onclick=()=>selectIcon(e);
      grid.appendChild(b);
    }
  }

  function selectIcon(icon){
    if(_target)_target.textContent=icon;
    fetch('/api/set-workspace-icon',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace:_workspace,icon:icon})});
    closePicker();
  }

  picker.querySelectorAll('.emoji-tab').forEach(tab=>{
    tab.onclick=()=>{
      picker.querySelectorAll('.emoji-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      renderGrid(tab.dataset.cat);
    };
  });

  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&input.value.trim()){selectIcon(input.value.trim());}
  });

  picker.querySelector('.emoji-reset').onclick=()=>{
    if(_target)_target.textContent='рҹ“Ғ';
    fetch('/api/set-workspace-icon',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace:_workspace,icon:''})});
    closePicker();
  };
  picker.querySelector('.emoji-close').onclick=closePicker;

  function closePicker(){picker.style.display='none';input.value='';}

  window.showIconPicker=function(el,workspace){
    _target=el;_workspace=workspace;
    const rect=el.getBoundingClientRect();
    picker.style.display='block';
    picker.style.position='fixed';
    picker.style.top=(rect.bottom+4)+'px';
    picker.style.left=rect.left+'px';
    renderGrid('tools');
    picker.querySelectorAll('.emoji-tab').forEach(t=>t.classList.remove('active'));
    picker.querySelector('[data-cat="tools"]').classList.add('active');
    input.value='';
  };

  document.addEventListener('click',e=>{
    if(picker.style.display!=='none'&&!picker.contains(e.target)&&!e.target.classList.contains('card-icon')){
      closePicker();
    }
  });
})();
</script>
