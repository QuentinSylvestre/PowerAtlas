{% extends "base.html" %}
{% block content %}
<div class="topbar">
  <img src="/static/poweratlas-banner.png" class="topbar-banner" alt="PowerAtlas">
  <div class="topbar-spacer"></div>
  <select class="topbar-select" onchange="fetch('/api/save-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'terminal_command',value:this.value})})">
    {% for value, label in terminal_options %}
      {% if value != 'custom' %}
      <option value="{{ value }}" {% if terminal_command == value or (not terminal_command and value == '') %}selected{% endif %}>{{ label }}</option>
      {% endif %}
    {% endfor %}
  </select>
  <div class="topbar-toggle{% if autostart %} active{% endif %}" onclick="this.classList.toggle('active');fetch('/api/autostart',{method:'POST'})">
    <span class="trust-dot"></span>Autostart
  </div>
  <div class="refresh-group">
    <span class="refresh-time" id="refreshTime"></span>
    <button class="refresh-btn" onclick="doRefresh()" aria-label="Refresh sessions">↻</button>
  </div>
  <div class="peek-hotkey-group">
    <label class="peek-label" for="peekHotkey">Peek</label>
    <input type="text" id="peekHotkey" class="peek-input" value="{{ peek_hotkey }}" placeholder="ctrl+shift+z"
           onchange="var v=this.value.trim().toLowerCase();fetch('/api/save-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'peek_hotkey',value:v})})">
  </div>
</div>

<div class="search-area">
  <div class="command-bar">
    <span class="search-icon">⌕</span>
    <input type="search" name="q" placeholder="Search sessions, folders..." aria-label="Search workspaces"
           hx-get="/search" hx-trigger="input changed delay:300ms" hx-target="#workspace-cards">
  </div>
</div>

<main class="panels-container">
  <aside class="left-panel" id="left-panel">
    <div class="section-label">Launchers <button class="launcher-add-btn" onclick="openNewLauncher()">+</button></div>
    <div id="launcher-tiles" class="launcher-grid" hx-get="/partials/launchers" hx-trigger="load" hx-swap="innerHTML"></div>
    <div id="pinned-cards" hx-get="/partials/pinned-sessions?fresh=1" hx-trigger="load" hx-swap="innerHTML"
         hx-on::after-swap="loadExpandedCards()">
    </div>
  </aside>
  <div class="center-panel" id="center-panel">
    <div id="pinned-workspaces" hx-get="/partials/pinned-workspaces?fresh=1" hx-trigger="load" hx-swap="innerHTML"
         hx-on::after-swap="loadExpandedCards()">
    </div>
  </div>
  <section class="right-panel" id="cards-area">
    <div id="workspace-cards" aria-busy="true"
         hx-get="/partials/workspaces?fresh=1" hx-trigger="load" hx-swap="innerHTML"
         hx-on::after-swap="this.removeAttribute('aria-busy');loadExpandedCards();startPinnedPoll()">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </section>
</main>

<div class="action-bar" id="actionBar">
  <span class="selection-info"><strong id="selCount">0</strong> sessions selected</span>
  <div class="topbar-spacer"></div>
  <button class="action-btn secondary" onclick="document.querySelectorAll('.session-row.selected,.workspace-card.selected').forEach(r=>r.classList.remove('selected'));updateActionBar()">Clear</button>
  <button class="action-btn launch" onclick="launchSelected()">▶ Launch selected</button>
</div>
<script>
window._activeProvider='all';
function updateActionBar(){var n=document.querySelectorAll('.session-row.selected').length+document.querySelectorAll('.workspace-card.selected').length;document.getElementById('selCount').textContent=n;document.getElementById('actionBar').classList.toggle('visible',n>0);updateLauncherBadges()}
function toggleCard(card){card.classList.toggle('collapsed');var body=card.querySelector('.card-body');if(!card.classList.contains('collapsed')&&body.dataset.loaded==='false'){body.dataset.loaded='true';var cwd=card.dataset.cwd;var provider=card.dataset.provider||'kiro-cli';fetch('/partials/sessions?cwd='+encodeURIComponent(cwd)+'&provider='+encodeURIComponent(provider)).then(function(r){return r.text()}).then(function(html){body.innerHTML=html}).catch(function(){body.innerHTML='<div class="new-session-inline">Failed to load</div>'})}}
function refreshCards(fresh){var qs=fresh?'&fresh=1':'';fetch('/partials/workspaces?provider='+encodeURIComponent(window._activeProvider||'all')+qs).then(function(r){return r.text()}).then(function(html){var el=document.getElementById('workspace-cards');el.innerHTML=html;if(window.htmx)htmx.process(el);loadExpandedCards()});fetch('/partials/pinned-sessions'+(fresh?'?fresh=1':'')).then(function(r){return r.text()}).then(function(html){var el=document.getElementById('pinned-cards');el.innerHTML=html;if(window.htmx)htmx.process(el);loadExpandedCards()});fetch('/partials/pinned-workspaces'+(fresh?'?fresh=1':'')).then(function(r){return r.text()}).then(function(html){var el=document.getElementById('pinned-workspaces');el.innerHTML=html;if(window.htmx)htmx.process(el);loadExpandedCards()})}
function showToast(html){var c=document.getElementById('toastContainer');if(!c){c=document.createElement('div');c.id='toastContainer';c.className='toast-container';document.body.appendChild(c)}var d=document.createElement('div');d.innerHTML=html;var t=d.firstElementChild;if(!t){t=document.createElement('div');t.className='toast toast-success';t.textContent=html||'Done'}c.appendChild(t);setTimeout(function(){t.remove()},4000)}
function resumeSession(btn){var row=btn.closest('.session-row');var card=row.closest('.workspace-card');fetch('/api/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:row.dataset.sid,workspace:row.dataset.cwd,provider:card?card.dataset.provider||'':''})}).then(function(r){return r.text()}).then(showToast)}
function copySid(btn){var row=btn.closest('.session-row');navigator.clipboard.writeText(row.dataset.sid).then(function(){showToast('<div class="toast toast-success">Copied<button class="toast-dismiss" onclick="this.parentElement.remove()">×</button></div>')})}
function pinSession(btn){var row=btn.closest('.session-row');var pinned=btn.classList.contains('pinned');var url=pinned?'/api/unpin-session':'/api/pin-session';fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:row.dataset.sid,workspace:row.dataset.cwd})}).then(function(){showToast('<div class="toast toast-success">'+(pinned?'Unpinned':'Pinned')+'<button class="toast-dismiss" onclick="this.parentElement.remove()">×</button></div>');refreshCards(true)})}
function pinWorkspace(btn){var card=btn.closest('.workspace-card');var pinned=btn.classList.contains('pinned');var url=pinned?'/api/unpin-folder':'/api/pin-folder';fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folder:card.dataset.cwd,provider:card.dataset.provider||'kiro-cli'})}).then(function(){refreshCards(true);showToast('<div class="toast toast-success">'+(pinned?'Unpinned':'Pinned')+'<button class="toast-dismiss" onclick="this.parentElement.remove()">×</button></div>')})}
function launchFresh(btn){var card=btn.closest('.workspace-card');fetch('/api/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace:card.dataset.cwd,provider:card.dataset.provider||''})}).then(function(r){return r.text()}).then(showToast)}
function launchSelected(){var sessions=[];document.querySelectorAll('.session-row.selected').forEach(function(r){var card=r.closest('.workspace-card');sessions.push({session_id:r.dataset.sid,workspace:r.dataset.cwd,provider:card?card.dataset.provider||'':''})});document.querySelectorAll('.workspace-card.selected').forEach(function(c){sessions.push({workspace:c.dataset.cwd,provider:c.dataset.provider||''})});if(!sessions.length)return;if(sessions.length>5&&!confirm('Launch '+sessions.length+' sessions?'))return;fetch('/api/launch-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessions:sessions})}).then(function(r){return r.text()}).then(showToast)}
function loadExpandedCards(){document.querySelectorAll('.workspace-card:not(.collapsed)').forEach(function(card){var body=card.querySelector('.card-body');if(body&&body.dataset.loaded==='false'){body.dataset.loaded='true';var provider=card.dataset.provider||'kiro-cli';fetch('/partials/sessions?cwd='+encodeURIComponent(card.dataset.cwd)+'&provider='+encodeURIComponent(provider)).then(function(r){return r.text()}).then(function(html){body.innerHTML=html})}})}
document.addEventListener('DOMContentLoaded',function(){document.addEventListener('htmx:afterSwap',function(){loadExpandedCards()});document.querySelector('.panels-container').addEventListener('htmx:configRequest',function(e){var path=e.detail.path||'';var m=path.match(/provider=([^&]*)/);if(m&&e.detail.elt&&e.detail.elt.classList&&e.detail.elt.classList.contains('provider-tab')){window._activeProvider=decodeURIComponent(m[1])}});fetch('/api/last-refresh').then(function(r){return r.json()}).then(function(d){if(d.last_refresh)document.getElementById('refreshTime').textContent=d.last_refresh});
document.addEventListener('visibilitychange',function(){if(!document.hidden){refreshCards(true)}});
});
var _pinnedPollTimer=null;var _pinnedPollCount=0;var _pinnedPollMax=8;
function startPinnedPoll(){if(_pinnedPollTimer)return;_pinnedPollCount=0;_pinnedPollTimer=setInterval(function(){_pinnedPollCount++;if(_pinnedPollCount>=_pinnedPollMax){clearInterval(_pinnedPollTimer);_pinnedPollTimer=null;return}fetch('/partials/pinned-sessions').then(function(r){return r.text()}).then(function(html){var el=document.getElementById('pinned-cards');el.innerHTML=html;if(window.htmx)htmx.process(el);loadExpandedCards()});fetch('/partials/pinned-workspaces').then(function(r){return r.text()}).then(function(html){var el=document.getElementById('pinned-workspaces');el.innerHTML=html;if(window.htmx)htmx.process(el);loadExpandedCards()})},15000)}
function doRefresh(){var btn=document.querySelector('.refresh-btn');btn.disabled=true;btn.textContent='...';fetch('/api/refresh',{method:'POST'}).then(function(r){return r.json()}).then(function(d){document.getElementById('refreshTime').textContent=d.last_refresh;refreshCards(true)}).finally(function(){btn.disabled=false;btn.textContent='\u21BB'})}
var _tailTimers={};function loadTail(el){var row=el.closest('.session-row');var sid=row.dataset.sid;var card=row.closest('.workspace-card');var provider=card?card.dataset.provider||'kiro-cli':'kiro-cli';var cwd=card?card.dataset.cwd||'':'';var slot=el.querySelector('.session-tooltip-slot');_tailTimers[sid]=setTimeout(function(){fetch('/partials/session-tail?sid='+encodeURIComponent(sid)+'&provider='+encodeURIComponent(provider)+'&cwd='+encodeURIComponent(cwd)).then(function(r){return r.text()}).then(function(html){slot.innerHTML=html;var rect=el.getBoundingClientRect();slot.style.left=rect.left+'px';slot.style.top=(rect.top-4)+'px';slot.style.transform='translateY(-100%)';slot.style.display='block'})},300)}function hideTail(el){var row=el.closest('.session-row');var sid=row.dataset.sid;clearTimeout(_tailTimers[sid]);var slot=el.querySelector('.session-tooltip-slot');slot.style.display='none'}
</script>
{% include "partials/emoji_picker.html" %}
{% include "partials/launcher_modal.html" %}
<script>
var _providerSettings={{provider_settings|tojson}};
var _providerBinaryDisplay={'kiro-cli':'kiro-cli chat','claude-code':'claude'};
function openProviderLauncherModal(id){var key=id.slice('provider--'.length);fetch('/api/provider/'+encodeURIComponent(key)).then(function(r){return r.json()}).then(function(d){var m=document.getElementById('launcherModal');document.getElementById('launcherId').value=id;document.getElementById('launcherName').value=d.provider||key;document.getElementById('launcherName').readOnly=true;document.getElementById('launcherCommand').value=_providerBinaryDisplay[key]||key;document.getElementById('launcherCommand').readOnly=true;document.getElementById('launcherArgs').value=d.default_args||'';document.getElementById('launcherCwd').value='';document.getElementById('launcherCwd').readOnly=true;document.getElementById('launcherEnv').value='';document.getElementById('launcherEnv').disabled=true;document.getElementById('launcherColor').value=d.color||'';document.getElementById('launcherTerminal').checked=true;document.getElementById('launcherTerminal').disabled=true;document.getElementById('launcherUseSelected').checked=true;document.getElementById('launcherUseSelected').disabled=true;document.getElementById('launcherDeleteBtn').style.display='none';document.getElementById('launcherEnabledRow').style.display='';document.getElementById('launcherEnabled').checked=d.enabled!==false;document.getElementById('launcherModalTitle').textContent='Provider Settings \u2014 '+key;document.querySelectorAll('.color-swatch').forEach(function(s){s.classList.toggle('selected',s.dataset.color===(d.color||''))});m.showModal()})}
document.getElementById('launcherModal').addEventListener('close',function(){var m=document.getElementById('launcherModal');m.querySelector('#launcherName').readOnly=false;m.querySelector('#launcherCommand').readOnly=false;m.querySelector('#launcherCwd').readOnly=false;m.querySelector('#launcherEnv').disabled=false;m.querySelector('#launcherTerminal').disabled=false;m.querySelector('#launcherUseSelected').disabled=false;document.getElementById('launcherEnabledRow').style.display='none'});
(function(){if(_providerSettings&&_providerSettings['kiro-cli']&&_providerSettings['kiro-cli'].default_args==='-a'&&!localStorage.getItem('pa_migration_toast')){localStorage.setItem('pa_migration_toast','1');setTimeout(function(){showToast('<div class="toast toast-success">Trust All is now per-provider \u2014 click \u2699\ufe0f on the provider tile to configure.<button class="toast-dismiss" onclick="this.parentElement.remove()">\u00d7</button></div>')},1000)}})();
</script>
<script>
var _launchers={{launchers|tojson}};
function getSelectedWorkspaceCwds(){var seen={};var cwds=[];document.querySelectorAll('.workspace-card.selected').forEach(function(c){var key=c.dataset.cwd.toLowerCase();if(!seen[key]){seen[key]=1;cwds.push(c.dataset.cwd)}});document.querySelectorAll('.session-row.selected').forEach(function(r){var cwd=r.dataset.cwd;if(cwd){var key=cwd.toLowerCase();if(!seen[key]){seen[key]=1;cwds.push(cwd)}}});return cwds}
function updateLauncherBadges(){var count=getSelectedWorkspaceCwds().length;_launchers.forEach(function(l){if(!l.use_selected_workspaces)return;var badge=document.getElementById('badge-'+l.id);if(!badge)return;if(count>0){badge.textContent=count;badge.classList.add('visible')}else{badge.textContent='';badge.classList.remove('visible')}});document.querySelectorAll('.provider-tile .launcher-badge').forEach(function(badge){if(count>0){badge.textContent=count;badge.classList.add('visible')}else{badge.textContent='';badge.classList.remove('visible')}})}
function runLauncherById(id){if(id.startsWith('provider--')){var key=id.slice('provider--'.length);var selected=getSelectedWorkspaceCwds();if(selected.length>0){var sessions=selected.map(function(w){return{workspace:w,provider:key}});fetch('/api/launch-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessions:sessions})}).then(function(r){return r.text()}).then(showToast)}else{showToast('<div class="toast toast-error">Select workspaces first<button class="toast-dismiss" onclick="this.parentElement.remove()">\u00d7</button></div>')}return}var l=_launchers.find(function(x){return x.id===id});if(!l)return;if(l.use_selected_workspaces){var selected=getSelectedWorkspaceCwds();if(selected.length>0){fetch('/api/launcher/run-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:l.id,workspaces:selected})}).then(function(r){return r.text()}).then(showToast);return}}var cwd=l.cwd||'';fetch('/api/launcher/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:l.command,custom_args:l.custom_args||'',cwd:cwd,env:l.env,name:l.name,terminal:l.terminal})}).then(function(r){return r.text()}).then(showToast)}
function openNewLauncher(){var m=document.getElementById('launcherModal');document.getElementById('launcherId').value='';document.getElementById('launcherName').value='';document.getElementById('launcherCommand').value='';document.getElementById('launcherArgs').value='';document.getElementById('launcherCwd').value='';document.getElementById('launcherEnv').value='';document.getElementById('launcherColor').value='';document.getElementById('launcherTerminal').checked=true;document.getElementById('launcherUseSelected').checked=false;document.getElementById('launcherDeleteBtn').style.display='none';document.getElementById('launcherModalTitle').textContent='New Launcher';document.querySelectorAll('.color-swatch').forEach(function(s){s.classList.remove('selected')});m.showModal();m.querySelector('input[type=text]').focus()}
function editLauncher(id){if(id.startsWith('provider--')){openProviderLauncherModal(id);return}var l=_launchers.find(function(x){return x.id===id});if(!l)return;var m=document.getElementById('launcherModal');document.getElementById('launcherId').value=l.id;document.getElementById('launcherName').value=l.name||'';document.getElementById('launcherCommand').value=l.command||'';document.getElementById('launcherArgs').value=l.custom_args||'';document.getElementById('launcherCwd').value=l.cwd||'';document.getElementById('launcherEnv').value=Object.entries(l.env||{}).map(function(e){return e[0]+'='+e[1]}).join('\n');document.getElementById('launcherColor').value=l.color||'';document.getElementById('launcherTerminal').checked=l.terminal!==false;document.getElementById('launcherUseSelected').checked=l.use_selected_workspaces||false;document.getElementById('launcherDeleteBtn').style.display='';document.getElementById('launcherModalTitle').textContent='Edit Launcher';document.querySelectorAll('.color-swatch').forEach(function(s){s.classList.toggle('selected',s.dataset.color===l.color)});m.showModal();m.querySelector('input[type=text]').focus()}
function saveLauncher(e){e.preventDefault();var id=document.getElementById('launcherId').value;if(id.startsWith('provider--')){var key=id.slice('provider--'.length);var payload={provider:key,default_args:document.getElementById('launcherArgs').value,color:document.getElementById('launcherColor').value,enabled:document.getElementById('launcherEnabled').checked};fetch('/api/provider/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.text()}).then(function(t){showToast(t);document.getElementById('launcherModal').close();htmx.ajax('GET','/partials/launchers','#launcher-tiles');refreshCards(true)});return}var envText=document.getElementById('launcherEnv').value;var env={};envText.split('\n').forEach(function(line){var eq=line.indexOf('=');if(eq>0)env[line.slice(0,eq).trim()]=line.slice(eq+1).trim()});var payload={name:document.getElementById('launcherName').value,command:document.getElementById('launcherCommand').value,custom_args:document.getElementById('launcherArgs').value,cwd:document.getElementById('launcherCwd').value,env:env,color:document.getElementById('launcherColor').value,terminal:document.getElementById('launcherTerminal').checked,use_selected_workspaces:document.getElementById('launcherUseSelected').checked};var url=id?'/api/launcher/update':'/api/launcher/create';if(id)payload.id=id;fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.text()}).then(function(t){showToast(t);return fetch('/api/launchers')}).then(function(r){return r.json()}).then(function(d){_launchers=d;document.getElementById('launcherModal').close();htmx.ajax('GET','/partials/launchers','#launcher-tiles')})}
function deleteLauncher(){var id=document.getElementById('launcherId').value;if(!id)return;fetch('/api/launcher/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})}).then(function(r){return r.text()}).then(function(t){showToast(t);return fetch('/api/launchers')}).then(function(r){return r.json()}).then(function(d){_launchers=d;document.getElementById('launcherModal').close();htmx.ajax('GET','/partials/launchers','#launcher-tiles')})}
document.getElementById('launcherColorPicker').addEventListener('click',function(e){var btn=e.target.closest('.color-swatch');if(!btn)return;var picker=document.getElementById('launcherColorPicker');var input=document.getElementById('launcherColor');var wasSelected=btn.classList.contains('selected');picker.querySelectorAll('.color-swatch').forEach(function(s){s.classList.remove('selected')});if(wasSelected){input.value=''}else{btn.classList.add('selected');input.value=btn.dataset.color}});
</script>
{% endblock %}
