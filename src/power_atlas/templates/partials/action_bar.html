<div class="action-bar" id="action-bar">
<label><input type="checkbox" id="select-all" onchange="document.querySelectorAll('.session-check').forEach(c => c.checked = this.checked)"> Select all</label>
<button class="btn-batch-launch" onclick="batchLaunch()" id="btn-batch" disabled>Launch All</button>
</div>
<script>
function updateBatch() {
  const checked = document.querySelectorAll('.session-check:checked');
  const btn = document.getElementById('btn-batch');
  btn.disabled = checked.length === 0;
  if (checked.length > 5) {
    btn.setAttribute('hx-confirm', `Launch ${checked.length} sessions?`);
  } else {
    btn.removeAttribute('hx-confirm');
  }
}
function batchLaunch() {
  const checked = document.querySelectorAll('.session-check:checked');
  const sessions = [...checked].map(c => ({session_id: c.dataset.sessionId, workspace: c.dataset.workspace}));
  fetch('/api/launch-batch', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({sessions})})
    .then(r => r.text()).then(html => {document.getElementById('toast-container').innerHTML = html;});
}
document.addEventListener('change', e => { if(e.target.classList.contains('session-check')) updateBatch(); });
</script>
