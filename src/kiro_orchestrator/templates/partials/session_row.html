<div class="session-row" data-sid="{{ session.session_id }}" data-cwd="{{ cwd }}" onclick="if(!event.target.closest('.session-actions')){this.classList.toggle('selected');updateActionBar()}">
  <div class="session-check"></div>
  <div class="session-content">
    <div class="session-title-row">
      <span class="session-title">{{ session.title or 'untitled' }}</span>
      <span class="session-time">{{ session.updated_at[:16] | replace('T', ' ') if session.updated_at else '' }}</span>
    </div>
    <div class="session-preview"><span class="label">First:</span>{{ (session.first_prompt or '')[:100] }}</div>
    <div class="session-last"><span class="label">Last:</span>"{{ (session.last_reply_tail or '')[:80] }}"</div>
  </div>
  <div class="session-actions">
    <button class="pin-btn{% if session.session_id in pinned_sessions %} pinned{% endif %}" onclick="pinSession(this)" aria-label="Pin session">📌</button>
    {% if not stale %}
    <button class="row-btn primary" onclick="resumeSession(this)" aria-label="Resume">Resume</button>
    {% endif %}
  </div>
</div>
