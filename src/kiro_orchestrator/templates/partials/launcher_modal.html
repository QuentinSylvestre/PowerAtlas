<dialog class="launcher-modal" id="launcherModal">
  <form method="dialog" onsubmit="saveLauncher(event)">
    <h3 id="launcherModalTitle">New Launcher</h3>
    <input type="hidden" id="launcherId" value="">
    <label>Name <input type="text" id="launcherName" required></label>
    <label>Command <input type="text" id="launcherCommand" required></label>
    <label>Default args <input type="text" id="launcherArgs"></label>
    <label>Working directory <input type="text" id="launcherCwd"></label>
    <label>Env (KEY=VAL per line) <textarea id="launcherEnv" rows="3"></textarea></label>
    <label>Icon <input type="text" id="launcherIcon" maxlength="2"></label>
    <div class="modal-actions">
      <button type="button" class="modal-delete-btn" id="launcherDeleteBtn" onclick="deleteLauncher()">Delete</button>
      <span class="topbar-spacer"></span>
      <button type="button" onclick="document.getElementById('launcherModal').close()">Cancel</button>
      <button type="submit" class="action-btn launch">Save</button>
    </div>
  </form>
</dialog>
