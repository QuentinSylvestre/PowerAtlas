{% extends "base.html" %}
{% block content %}
<div class="topbar">
  <div class="topbar-title">Kiro Orchestrator</div>
  <div class="topbar-spacer"></div>
  <div class="trust-toggle{% if trust_all_tools %} active{% endif %}"
       hx-post="/api/toggle-trust" hx-swap="none"
       onclick="this.classList.toggle('active')">
    <span class="trust-dot"></span>Trust all tools
  </div>
  <a href="/settings" class="settings-btn" aria-label="Settings">⚙</a>
</div>

<div class="search-area">
  <div class="command-bar">
    <span class="search-icon">⌕</span>
    <input type="search" name="q" placeholder="Search sessions, folders..." aria-label="Search workspaces"
           hx-get="/search" hx-trigger="input changed delay:300ms" hx-target="#cards-area">
  </div>
</div>

<main id="cards-area" class="cards-area" aria-busy="true"
      hx-get="/partials/workspaces" hx-trigger="load" hx-swap="innerHTML"
      hx-on::after-swap="this.removeAttribute('aria-busy')">
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
</main>

<div class="action-bar" id="actionBar">
  <span class="selection-info"><strong id="selCount">0</strong> sessions selected</span>
  <div class="topbar-spacer"></div>
  <button class="action-btn secondary" onclick="document.querySelectorAll('.session-row.selected').forEach(r=>r.classList.remove('selected'));updateActionBar()">Clear</button>
  <button class="action-btn launch" hx-post="/api/launch-batch" hx-include=".session-row.selected [name=session_id]">▶ Launch selected</button>
</div>
<script>
function updateActionBar(){var n=document.querySelectorAll('.session-row.selected').length;document.getElementById('selCount').textContent=n;document.getElementById('actionBar').classList.toggle('visible',n>0)}
function toggleCard(card){card.classList.toggle('collapsed');var body=card.querySelector('.card-body');if(!card.classList.contains('collapsed')&&body.dataset.loaded==='false'){body.dataset.loaded='true';var cwd=card.dataset.cwd;fetch('/partials/sessions?cwd='+encodeURIComponent(cwd)).then(function(r){return r.text()}).then(function(html){body.innerHTML=html}).catch(function(){body.innerHTML='<div class="new-session-inline">Failed to load</div>'})}}</script>
{% endblock %}
