{% extends "base.html" %}
{% block content %}
<div class="topbar">
  <div class="topbar-title">Kiro Orchestrator</div>
  <div class="topbar-spacer"></div>
  <select class="topbar-select" onchange="fetch('/api/save-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'terminal_command',value:this.value})})">
    <option value="" {% if not terminal_command %}selected{% endif %}>Terminal: Auto</option>
    <option value="wt" {% if terminal_command == 'wt' %}selected{% endif %}>Terminal: WT</option>
    <option value="pwsh" {% if terminal_command == 'pwsh' %}selected{% endif %}>Terminal: pwsh</option>
    <option value="cmd" {% if terminal_command == 'cmd' %}selected{% endif %}>Terminal: cmd</option>
  </select>
  <div class="trust-toggle{% if trust_all_tools %} active{% endif %}" onclick="this.classList.toggle('active');fetch('/api/toggle-trust',{method:'POST'})">
    <span class="trust-dot"></span>Trust all
  </div>
  <div class="topbar-toggle{% if autostart %} active{% endif %}" onclick="this.classList.toggle('active');fetch('/api/autostart',{method:'POST'})">
    <span class="trust-dot"></span>Autostart
  </div>
</div>

<div class="search-area">
  <div class="command-bar">
    <span class="search-icon">⌕</span>
    <input type="search" name="q" placeholder="Search sessions, folders..." aria-label="Search workspaces"
           hx-get="/search" hx-trigger="input changed delay:300ms" hx-target="#cards-area">
  </div>
</div>

<main id="cards-area" class="cards-area" aria-busy="true"
      hx-get="/partials/workspaces" hx-trigger="load" hx-swap="innerHTML"
      hx-on::after-swap="this.removeAttribute('aria-busy')">
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
</main>

<div class="action-bar" id="actionBar">
  <span class="selection-info"><strong id="selCount">0</strong> sessions selected</span>
  <div class="topbar-spacer"></div>
  <button class="action-btn secondary" onclick="document.querySelectorAll('.session-row.selected').forEach(r=>r.classList.remove('selected'));updateActionBar()">Clear</button>
  <button class="action-btn launch" onclick="launchSelected()">▶ Launch selected</button>
</div>
<script>
function updateActionBar(){var n=document.querySelectorAll('.session-row.selected').length;document.getElementById('selCount').textContent=n;document.getElementById('actionBar').classList.toggle('visible',n>0)}
function toggleCard(card){card.classList.toggle('collapsed');var body=card.querySelector('.card-body');if(!card.classList.contains('collapsed')&&body.dataset.loaded==='false'){body.dataset.loaded='true';var cwd=card.dataset.cwd;fetch('/partials/sessions?cwd='+encodeURIComponent(cwd)).then(function(r){return r.text()}).then(function(html){body.innerHTML=html}).catch(function(){body.innerHTML='<div class="new-session-inline">Failed to load</div>'})}}
function refreshCards(){fetch('/partials/workspaces').then(function(r){return r.text()}).then(function(html){document.getElementById('cards-area').innerHTML=html;loadExpandedCards()})}function showToast(html){var c=document.getElementById('toastContainer');if(!c){c=document.createElement('div');c.id='toastContainer';c.className='toast-container';document.body.appendChild(c)}var d=document.createElement('div');d.innerHTML=html;var t=d.firstElementChild;if(!t){t=document.createElement('div');t.className='toast toast-success';t.textContent=html||'Done'}c.appendChild(t);setTimeout(function(){t.remove()},4000)}
function resumeSession(btn){var row=btn.closest('.session-row');fetch('/api/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:row.dataset.sid,workspace:row.dataset.cwd})}).then(function(r){return r.text()}).then(showToast)}
function pinSession(btn){var row=btn.closest('.session-row');var pinned=btn.classList.contains('pinned');var url=pinned?'/api/unpin-session':'/api/pin-session';fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:row.dataset.sid,workspace:row.dataset.cwd})}).then(function(){showToast('<div class="toast toast-success">'+(pinned?'Unpinned':'Pinned')+'<button class="toast-dismiss" onclick="this.parentElement.remove()">×</button></div>');refreshCards()})}
function pinWorkspace(btn){var card=btn.closest('.workspace-card');var pinned=btn.classList.contains('pinned');var url=pinned?'/api/unpin-folder':'/api/pin-folder';fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folder:card.dataset.cwd})}).then(function(){if(pinned){btn.classList.remove('pinned');btn.style.opacity='0';refreshCards()}else{btn.classList.add('pinned');refreshCards()};showToast('<div class="toast toast-success">'+(pinned?'Unpinned':'Pinned')+'<button class="toast-dismiss" onclick="this.parentElement.remove()">×</button></div>')})}
function launchFresh(btn){var card=btn.closest('.workspace-card');fetch('/api/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace:card.dataset.cwd})}).then(function(r){return r.text()}).then(showToast)}
function launchSelected(){var rows=document.querySelectorAll('.session-row.selected');if(!rows.length)return;var sessions=[];rows.forEach(function(r){sessions.push({session_id:r.dataset.sid,workspace:r.dataset.cwd})});if(sessions.length>5&&!confirm('Launch '+sessions.length+' sessions?'))return;fetch('/api/launch-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessions:sessions})}).then(function(r){return r.text()}).then(showToast)}
function loadExpandedCards(){document.querySelectorAll('.workspace-card:not(.collapsed)').forEach(function(card){var body=card.querySelector('.card-body');if(body&&body.dataset.loaded==='false'){body.dataset.loaded='true';fetch('/partials/sessions?cwd='+encodeURIComponent(card.dataset.cwd)).then(function(r){return r.text()}).then(function(html){body.innerHTML=html})}})}
document.addEventListener('DOMContentLoaded',function(){document.getElementById('cards-area').addEventListener('htmx:afterSwap',loadExpandedCards)});
</script>
{% endblock %}
