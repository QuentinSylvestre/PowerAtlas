<div class="workspace-card{% if stale %} stale{% endif %} collapsed" data-cwd="{{ cwd }}">
  <div class="card-header" onclick="toggleCard(this.parentElement)">
    <span class="card-chevron">▼</span>
    <span class="card-folder-name">{{ folder_name }}</span>
    <div class="card-meta">
      <span class="card-count">{{ session_count if session_count is defined else sessions|length }}</span>
      {% if stale %}<span class="badge-stale">missing</span>{% endif %}
    </div>
  </div>
  <div class="card-body" data-loaded="{% if sessions %}true{% else %}false{% endif %}">
    {% if sessions %}
    {% for session in sessions %}
    {% include "partials/session_row.html" %}
    {% endfor %}
    {% else %}
    <div class="loading-sessions">Loading...</div>
    {% endif %}
  </div>
</div>
